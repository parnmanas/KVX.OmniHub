; OmniHub ESP32 firmware
; PlatformIO project for Arduino-ESP32 framework.
;
; Boards: default is the generic ESP32 DevKit-C (ESP32-WROOM-32).
; Override with:  pio run -e esp32-s3
;
; Build:   pio run -e esp32dev
; Flash:   pio run -e esp32dev -t upload
; Monitor: pio device monitor -b 115200
; Clean:   pio run -t clean

[platformio]
default_envs = esp32dev

[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

; Flash layout: 4MB total, single OTA slot is not used yet so we use the
; default Arduino partition table. Override here if you need a custom one.
; board_build.partitions = partitions.csv

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DARDUINOJSON_USE_LONG_LONG=1
  -std=gnu++17
build_unflags =
  -std=gnu++11

lib_deps =
  tzapu/WiFiManager @ ^2.0.17
  links2004/WebSockets @ ^2.6.1
  bblanchon/ArduinoJson @ ^7.2.0
  crankyoldgit/IRremoteESP8266 @ ^2.8.6

[env:esp32dev]
platform = espressif32 @ ^6.9.0
board = esp32dev

[env:esp32-s3]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
; ESP32-S3 ROM disables some classic-bluetooth features but Wi-Fi/IR are fine.
